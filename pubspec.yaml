name: dart_ts_generator
version: 1.0.1
description: >
  A build_runner builder that converts Dart json_serializable models and enums
  into TypeScript classes with class-transformer, class-validator, and IST-aware
  date/geo utilities.

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  analyzer: ">=10.0.0 <13.0.0"
  build: ^4.0.4
  source_gen: ^4.1.2
  yaml: ^3.1.3
  collection: ^1.19.1
  path: ^1.9.1
  glob: ^2.1.3
  dart_style: ^3.1.4

dev_dependencies:
  build_runner: ^2.1.8
  lints: ^6.0.0
  test: ^1.16.0
