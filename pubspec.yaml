name: ei_ts_codegen
version: 1.0.1
description: >
  A build_runner builder that converts Dart json_serializable models and enums
  into TypeScript classes with class-transformer, class-validator, and IST-aware
  date/geo utilities.
  
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  build: ^4.0.4
  analyzer: '>=10.0.0 <13.0.0'
  source_gen: ^4.1.2
  dart_style: ^3.1.4
  glob: ^2.1.3

dev_dependencies:
  build_runner: ^2.1.8
  lints: ^6.0.0
  test: ^1.16.0
